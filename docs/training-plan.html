class="bg-gym-card border rounded-xl overflow-hidden transition-colors border-gym-border hover:border-primary-500/30"><button class="w-full text-left p-4 flex items-start justify-between gap-3"><div class="flex-1 min-w-0"><div class="flex items-center gap-2 flex-wrap mb-1"><h3 class="font-bold text-white">PPL 分化训练（推/拉/腿）</h3><span class="text-xs bg-primary-500/20 text-primary-400 px-2 py-0.5 rounded-full">6<!-- -->天/周</span><span class="text-xs bg-gym-dark text-gym-muted px-2 py-0.5 rounded-full border border-gym-border">💪<!-- --> <!-- -->增肌</span></div><p class="text-xs text-gym-text line-clamp-2">经典的健美增肌分化训练。每周 6 天训练 + 1 天休息，每个肌群每周训练 2 次。高频刺激 = 更多肌肉蛋白质合成窗口。</p><div class="flex items-center gap-3 mt-2 text-xs text-gym-muted"><span>6<!-- --> 个训练日</span><span>27<!-- --> 个动作</span><span class="text-green-400">27<!-- --> 已匹配</span></div></div><span class="text-gym-muted text-sm mt-1 shrink-0">▼</span></button></div><div class="bg-gym-card border rounded-xl overflow-hidden transition-colors border-gym-border hover:border-primary-500/30"><button class="w-full text-left p-4 flex items-start justify-between gap-3"><div class="flex-1 min-w-0"><div class="flex items-center gap-2 flex-wrap mb-1"><h3 class="font-bold text-white">上下肢分化训练（Upper/Lower）</h3><span class="text-xs bg-primary-500/20 text-primary-400 px-2 py-0.5 rounded-full">4<!-- -->天/周</span><span class="text-xs bg-gym-dark text-gym-muted px-2 py-0.5 rounded-full border border-gym-border">🏋️<!-- --> <!-- -->增力</span></div><p class="text-xs text-gym-text line-clamp-2">以三大项（深蹲、卧推、硬拉）为核心的力量训练计划。每周 4 天，每个肌群每周 2 次刺激。低次数、高重量、长休息。</p><div class="flex items-center gap-3 mt-2 text-xs text-gym-muted"><span>4<!-- --> 个训练日</span><span>17<!-- --> 个动作</span><span class="text-green-400">17<!-- --> 已匹配</span></div></div><span class="text-gym-muted text-sm mt-1 shrink-0">▼</span></button></div><div class="bg-gym-card border rounded-xl overflow-hidden transition-colors border-gym-border hover:border-primary-500/30"><button class="w-full text-left p-4 flex items-start justify-between gap-3"><div class="flex-1 min-w-0"><div class="flex items-center gap-2 flex-wrap mb-1"><h3 class="font-bold text-white">力量 + 代谢结合训练</h3><span class="text-xs bg-primary-500/20 text-primary-400 px-2 py-0.5 rounded-full">5<!-- -->天/周</span><span class="text-xs bg-gym-dark text-gym-muted px-2 py-0.5 rounded-full border border-gym-border">🔥<!-- --> <!-- -->减脂</span></div><p class="text-xs text-gym-text line-clamp-2">保持肌肉量的同时最大化热量消耗。每周 3 天力量训练（全身性复合动作为主）+ 2 天有氧/HIIT。</p><div class="flex items-center gap-3 mt-2 text-xs text-gym-muted"><span>3<!-- --> 个训练日</span><span>14<!-- --> 个动作</span><span class="text-green-400">14<!-- --> 已匹配</span></div></div><span class="text-gym-muted text-sm mt-1 shrink-0">▼</span></button></div><div class="bg-gym-card border rounded-xl overflow-hidden transition-colors border-gym-border hover:border-primary-500/30"><button class="w-full text-left p-4 flex items-start justify-between gap-3"><div class="flex-1 min-w-0"><div class="flex items-center gap-2 flex-wrap mb-1"><h3 class="font-bold text-white">全身维持训练</h3><span class="text-xs bg-primary-500/20 text-primary-400 px-2 py-0.5 rounded-full">3<!-- -->天/周</span><span class="text-xs bg-gym-dark text-gym-muted px-2 py-0.5 rounded-full border border-gym-border">🧘<!-- --> <!-- -->维持</span></div><p class="text-xs text-gym-text line-clamp-2">以最低有效训练量维持肌肉和力量。每周 3 天，每次涵盖全身主要肌群。适合忙碌时期或减载阶段。</p><div class="flex items-center gap-3 mt-2 text-xs text-gym-muted"><span>3<!-- --> 个训练日</span><span>12<!-- --> 个动作</span><span class="text-green-400">12<!-- --> 已匹配</span></div></div><span class="text-gym-muted text-sm mt-1 shrink-0">▼</span></button></div><div class="bg-gym-card border rounded-xl overflow-hidden transition-colors border-gym-border hover:border-primary-500/30"><button class="w-full text-left p-4 flex items-start justify-between gap-3"><div class="flex-1 min-w-0"><div class="flex items-center gap-2 flex-wrap mb-1"><h3 class="font-bold text-white">五分化训练（Bro Split）</h3><span class="text-xs bg-primary-500/20 text-primary-400 px-2 py-0.5 rounded-full">5<!-- -->天/周</span><span class="text-xs bg-gym-dark text-gym-muted px-2 py-0.5 rounded-full border border-gym-border">💪<!-- --> <!-- -->增肌</span></div><p class="text-xs text-gym-text line-clamp-2">经典健美分化训练。每天专注一个肌群，单次训练容量大、泵感强。适合训练 2 年以上、追求肌肉细节雕刻的中高级训练者。新手慎用——自然健身者每肌群每周只刺激 1 次，增肌效率不如高频训练。</p><div class="flex items-center gap-3 mt-2 text-xs text-gym-muted"><span>5<!-- --> 个训练日</span><span>21<!-- --> 个动作</span><span class="text-green-400">21<!-- --> 已匹配</span></div></div><span class="text-gym-muted text-sm mt-1 shrink-0">▼</span></button></div><div class="bg-gym-card border rounded-xl overflow-hidden transition-colors border-gym-border hover:border-primary-500/30"><button class="w-full text-left p-4 flex items-start justify-between gap-3"><div class="flex-1 min-w-0"><div class="flex items-center gap-2 flex-wrap mb-1"><h3 class="font-bold text-white">三分化精简版（3 天/周）</h3><span class="text-xs bg-primary-500/20 text-primary-400 px-2 py-0.5 rounded-full">3<!-- -->天/周</span><span class="text-xs bg-gym-dark text-gym-muted px-2 py-0.5 rounded-full border border-gym-border">💪<!-- --> <!-- -->增肌</span></div><p class="text-xs text-gym-text line-clamp-2">PPL 三分化的低频率版本。每周只练 3 天（推/拉/腿各一次），每肌群每周刺激 1 次。适合每周只能去 3 次健身房、或刚开始尝试分化训练的新手。缺点：增肌效率不如 6 天版（每肌群 2 次/周），但胜在容易坚持。</p><div class="flex items-center gap-3 mt-2 text-xs text-gym-muted"><span>3<!-- --> 个训练日</span><span>15<!-- --> 个动作</span><span class="text-green-400">15<!-- --> 已匹配</span></div></div><span class="text-gym-muted text-sm mt-1 shrink-0">▼</span></button></div><div class="bg-gym-card border rounded-xl overflow-hidden transition-colors border-gym-border hover:border-primary-500/30"><button class="w-full text-left p-4 flex items-start justify-between gap-3"><div class="flex-1 min-w-0"><div class="flex items-center gap-2 flex-wrap mb-1"><h3 class="font-bold text-white">ULPPL 混合分化（5 天/周）</h3><span class="text-xs bg-primary-500/20 text-primary-400 px-2 py-0.5 rounded-full">5<!-- -->天/周</span><span class="text-xs bg-gym-dark text-gym-muted px-2 py-0.5 rounded-full border border-gym-border">💪<!-- --> <!-- -->增肌</span></div><p class="text-xs text-gym-text line-clamp-2">Upper/Lower × PPL 的结合体。周一上肢、周二下肢、周三休息、周四五推拉、周六腿。每肌群每周刺激 2 次，同时保留 2 天休息。是目前最受推崇的 5 天分化方案之一，兼顾频率和恢复。适合能稳定训练 5 天/周的中级训练者。</p><div class="flex items-center gap-3 mt-2 text-xs text-gym-muted"><span>5<!-- --> 个训练日</span><span>21<!-- --> 个动作</span><span class="text-green-400">21<!-- --> 已匹配</span></div></div><span class="text-gym-muted text-sm mt-1 shrink-0">▼</span></button></div></div></div></main><script src="/fitness-training-system/_next/static/chunks/webpack-b936061ef7da0526.js" async=""></script><script>(self.__next_f=self.__next_f||[]).push([0]);self.__next_f.push([2,null])</script><script>self.__next_f.push([1,"1:HL[\"/fitness-training-system/_next/static/css/01071e0409a93748.css\",\"style\"]\n"])</script><script>self.__next_f.push([1,"2:I[2846,[],\"\"]\n4:I[9107,[],\"ClientPageRoot\"]\n5:I[207,[\"648\",\"static/chunks/648-8fe7735d31d295a8.js\",\"47\",\"static/chunks/47-49379a1995c37652.js\",\"484\",\"static/chunks/484-7718698725f881fc.js\",\"535\",\"static/chunks/app/training-plan/page-c4e9349eaa16b7b0.js\"],\"default\",1]\n6:I[4707,[],\"\"]\n7:I[6423,[],\"\"]\n8:I[8901,[\"648\",\"static/chunks/648-8fe7735d31d295a8.js\",\"185\",\"static/chunks/app/layout-c30d436a8173227e.js\"],\"default\"]\na:I[1060,[],\"\"]\nb:[]\n"])</script><script>self.__next_f.push([1,"0:[\"$\",\"$L2\",null,{\"buildId\":\"OkgWP-vx5Z4_03shjoeVi\",\"assetPrefix\":\"/fitness-training-system\",\"urlParts\":[\"\",\"training-plan\"],\"initialTree\":[\"\",{\"children\":[\"training-plan\",{\"children\":[\"__PAGE__\",{}]}]},\"$undefined\",\"$undefined\",true],\"initialSeedData\":[\"\",{\"children\":[\"training-plan\",{\"children\":[\"__PAGE__\",{},[[\"$L3\",[\"$\",\"$L4\",null,{\"props\":{\"params\":{},\"searchParams\":{}},\"Component\":\"$5\"}],null],null],null]},[null,
